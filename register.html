<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – AgriMerchant</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .role-option {
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 12px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }
    .role-option:hover { border-color: var(--primary-light); background: var(--primary-pale); }
    .role-option.selected { border-color: var(--primary); background: var(--primary-pale); }
    .role-option .role-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .role-option .role-name { font-weight: 700; font-size: 0.9rem; }
    .role-option .role-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .role-option input { position: absolute; opacity: 0; width: 0; height: 0; }
    .vendor-fields { display: none; }
    .vendor-fields.show { display: block; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card" style="max-width: 500px;">
    <div class="auth-logo">
      <div class="logo-icon">🌿</div>
      <h2>Create Account</h2>
      <p>Join the AgriMerchant community</p>
    </div>

    <!-- Role Selector -->
    <div style="margin-bottom:8px;">
      <label class="form-label">I am a...</label>
    </div>
    <div class="role-selector">
      <label class="role-option selected" onclick="selectRole('customer', this)">
        <input type="radio" name="role" value="customer" checked>
        <div class="role-icon">🛒</div>
        <div class="role-name">Customer</div>
        <div class="role-desc">Buy fresh produce</div>
      </label>
      <label class="role-option" onclick="selectRole('vendor', this)">
        <input type="radio" name="role" value="vendor">
        <div class="role-icon">👨‍🌾</div>
        <div class="role-name">Farmer / Vendor</div>
        <div class="role-desc">Sell your produce</div>
      </label>
    </div>

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-input" id="reg-name" placeholder="Priya Sharma" required>
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="reg-email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="reg-password" placeholder="Min 6 characters" required>
    </div>

    <!-- Vendor-specific fields -->
    <div class="vendor-fields" id="vendor-fields">
      <div class="form-group">
        <label class="form-label">Farm / Business Name</label>
        <input type="text" class="form-input" id="reg-farm" placeholder="e.g. Ravi Organic Farms">
      </div>
      <div class="form-group">
        <label class="form-label">Location (Village / City)</label>
        <input type="text" class="form-input" id="reg-location" placeholder="e.g. Pune, Maharashtra">
      </div>
    </div>

    <div id="reg-error" style="color:#ef5350; font-size:0.85rem; margin-bottom:12px; display:none;"></div>

    <button class="btn btn-primary btn-block" onclick="handleRegister()">Create Account →</button>

    <div class="auth-switch mt-2">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
    <div class="auth-switch mt-1">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>
</div>

<script src="utils.js"></script>
<script>
  let selectedRole = 'customer';

  // Pre-select role from URL
  const params = new URLSearchParams(window.location.search);
  if (params.get('role') === 'vendor') {
    setTimeout(() => {
      selectRole('vendor', document.querySelectorAll('.role-option')[1]);
    }, 100);
  }

  function selectRole(role, el) {
    selectedRole = role;
    document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    el.querySelector('input').checked = true;
    const vendorFields = document.getElementById('vendor-fields');
    if (role === 'vendor') vendorFields.classList.add('show');
    else vendorFields.classList.remove('show');
  }

  function handleRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim().toLowerCase();
    const password = document.getElementById('reg-password').value;
    const errorEl = document.getElementById('reg-error');

    errorEl.style.display = 'none';

    if (!name || !email || !password) {
      errorEl.textContent = 'Please fill in all required fields';
      errorEl.style.display = 'block';
      return;
    }

    if (password.length < 6) {
      errorEl.textContent = 'Password must be at least 6 characters';
      errorEl.style.display = 'block';
      return;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      errorEl.textContent = 'Please enter a valid email address';
      errorEl.style.display = 'block';
      return;
    }

    // Check duplicates
    const users = getUsers();
    const vendors = getVendors();
    const allAccounts = [...users, ...vendors];
    if (allAccounts.find(a => a.email.toLowerCase() === email)) {
      errorEl.textContent = 'An account with this email already exists';
      errorEl.style.display = 'block';
      return;
    }

    const id = genId(selectedRole === 'vendor' ? 'v' : 'c');
    const createdAt = new Date().toISOString();

    if (selectedRole === 'vendor') {
      const farm = document.getElementById('reg-farm').value.trim() || name + "'s Farm";
      const location = document.getElementById('reg-location').value.trim() || 'India';
      const vendor = { id, name, email, password, role: 'vendor', farm, location, createdAt };
      const updated = getVendors();
      updated.push(vendor);
      saveVendors(updated);
      localStorage.setItem('loggedInUser', JSON.stringify(vendor));
    } else {
      const cust = { id, name, email, password, role: 'customer', createdAt };
      const updated = getUsers();
      updated.push(cust);
      saveUsers(updated);
      localStorage.setItem('loggedInUser', JSON.stringify(cust));
    }

    showToast(`Welcome to AgriMerchant, ${name}! 🎉`);
    setTimeout(() => {
      if (selectedRole === 'vendor') window.location.href = 'vendor_dashboard.html';
      else window.location.href = 'index.html';
    }, 800);
  }

  document.addEventListener('keypress', e => { if (e.key === 'Enter') handleRegister(); });
</script>
</body>
</html>
