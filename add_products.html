<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product – AgriMerchant</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .add-product-wrap {
      max-width: 640px;
      margin: 40px auto;
      padding: 0 24px;
    }
    .form-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 36px;
      box-shadow: var(--shadow-md);
    }
    .form-card-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .img-preview-wrap {
      width: 100%;
      height: 180px;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 2px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      margin-bottom: 8px;
    }
    .img-preview-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .img-placeholder {
      text-align: center;
      color: var(--text-muted);
    }
    .img-placeholder .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .img-placeholder p { font-size: 0.85rem; }
    .suggested-imgs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .suggested-img {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all var(--transition);
    }
    .suggested-img:hover { border-color: var(--primary); transform: scale(1.05); }
    @media(max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">🌿</div>
      AgriMerchant
    </a>
    <div class="nav-links" id="nav-links-wrap">
      <a href="vendor_dashboard.html" class="nav-link">← Dashboard</a>
      <span id="nav-auth-links" style="display:contents"></span>
      <button class="dark-toggle">🌙</button>
    </div>
    <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="add-product-wrap">
  <div class="form-card">
    <div class="form-card-title">➕ Add New Product</div>
    <p class="text-muted mb-3">List your farm produce for customers to discover</p>

    <!-- Image Preview -->
    <div class="form-group">
      <label class="form-label">Product Image</label>
      <div class="img-preview-wrap" id="img-preview-wrap">
        <img id="img-preview" src="" alt="preview">
        <div class="img-placeholder" id="img-placeholder">
          <div class="icon">📸</div>
          <p>Enter image URL below to preview</p>
        </div>
      </div>

      <input type="text" class="form-input" id="prod-img" placeholder="https://images.unsplash.com/..." oninput="previewImage(this.value)">

      <div style="margin-top:8px;">
        <div style="font-size:0.78rem; color:var(--text-muted); margin-bottom:6px;">Quick pick from Unsplash:</div>
        <div class="suggested-imgs">
          <img class="suggested-img" src="https://images.unsplash.com/photo-1553279768-865429fa0078?w=100&q=70" onclick="pickImg('https://images.unsplash.com/photo-1553279768-865429fa0078?w=400&q=80')" title="Mango">
          <img class="suggested-img" src="https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?w=100&q=70" onclick="pickImg('https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?w=400&q=80')" title="Banana">
          <img class="suggested-img" src="https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=100&q=70" onclick="pickImg('https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=400&q=80')" title="Tomato">
          <img class="suggested-img" src="https://images.unsplash.com/photo-1587735243475-37a298e3a31e?w=100&q=70" onclick="pickImg('https://images.unsplash.com/photo-1587735243475-37a298e3a31e?w=400&q=80')" title="Onion">
          <img class="suggested-img" src="https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=100&q=70" onclick="pickImg('https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400&q=80')" title="Potato">
          <img class="suggested-img" src="https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?w=100&q=70" onclick="pickImg('https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?w=400&q=80')" title="Carrot">
          <img class="suggested-img" src="https://images.unsplash.com/photo-1576045057995-568f588f82fb?w=100&q=70" onclick="pickImg('https://images.unsplash.com/photo-1576045057995-568f588f82fb?w=400&q=80')" title="Spinach">
          <img class="suggested-img" src="https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=100&q=70" onclick="pickImg('https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=400&q=80')" title="Apple">
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Product Name *</label>
      <input type="text" class="form-input" id="prod-name" placeholder="e.g. Alphonso Mango" required>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Category *</label>
        <select class="form-input" id="prod-category">
          <option value="Fruits">🍎 Fruits</option>
          <option value="Vegetables">🥕 Vegetables</option>
          <option value="Leafy">🥬 Leafy Greens</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Badge</label>
        <select class="form-input" id="prod-badge">
          <option value="">None</option>
          <option value="Organic">🌱 Organic</option>
          <option value="Seasonal">☀️ Seasonal</option>
          <option value="Premium">⭐ Premium</option>
          <option value="Fresh">💧 Fresh</option>
        </select>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Price (₹) *</label>
        <input type="number" class="form-input" id="prod-price" placeholder="e.g. 120" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Stock Quantity *</label>
        <input type="number" class="form-input" id="prod-stock" placeholder="e.g. 50" min="1">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Unit *</label>
      <select class="form-input" id="prod-unit">
        <option value="per kg">per kg</option>
        <option value="per dozen">per dozen</option>
        <option value="per piece">per piece</option>
        <option value="per bunch">per bunch</option>
        <option value="per 500g">per 500g</option>
        <option value="per litre">per litre</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Description (optional)</label>
      <textarea class="form-input" id="prod-desc" rows="3" placeholder="Fresh and organic, harvested this morning from our farm..."></textarea>
    </div>

    <div id="form-error" style="color:#ef5350; font-size:0.85rem; margin-bottom:12px; display:none;"></div>

    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" style="flex:1" onclick="addProduct()">🌿 List Product</button>
      <a href="vendor_dashboard.html" class="btn btn-secondary">Cancel</a>
    </div>
  </div>
</div>

<script src="utils.js"></script>
<script>
  let vendorUser;

  document.addEventListener('DOMContentLoaded', () => {
    vendorUser = requireAuth('vendor');
  });

  function previewImage(url) {
    const img = document.getElementById('img-preview');
    const placeholder = document.getElementById('img-placeholder');
    if (url) {
      img.src = url;
      img.style.display = 'block';
      placeholder.style.display = 'none';
      img.onerror = () => { img.style.display = 'none'; placeholder.style.display = 'block'; };
    } else {
      img.style.display = 'none';
      placeholder.style.display = 'block';
    }
  }

  function pickImg(url) {
    document.getElementById('prod-img').value = url;
    previewImage(url);
  }

  function addProduct() {
    const errorEl = document.getElementById('form-error');
    errorEl.style.display = 'none';

    const name = document.getElementById('prod-name').value.trim();
    const price = parseFloat(document.getElementById('prod-price').value);
    const stock = parseInt(document.getElementById('prod-stock').value);
    const category = document.getElementById('prod-category').value;
    const unit = document.getElementById('prod-unit').value;
    const badge = document.getElementById('prod-badge').value;
    const img = document.getElementById('prod-img').value.trim() || 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&q=80';

    if (!name) { errorEl.textContent = 'Product name is required'; errorEl.style.display = 'block'; return; }
    if (!price || price <= 0) { errorEl.textContent = 'Enter a valid price'; errorEl.style.display = 'block'; return; }
    if (!stock || stock <= 0) { errorEl.textContent = 'Enter a valid stock quantity'; errorEl.style.display = 'block'; return; }

    const product = {
      id: genId('p'),
      name,
      category,
      price,
      unit,
      stock,
      badge,
      img,
      vendorId: vendorUser.id,
      vendorName: vendorUser.farm || vendorUser.name,
      description: document.getElementById('prod-desc').value.trim(),
      createdAt: new Date().toISOString()
    };

    const products = getProducts();
    products.push(product);
    saveProducts(products);

    showToast(`${name} listed successfully! 🌿`);
    setTimeout(() => window.location.href = 'vendor_dashboard.html', 800);
  }
</script>
</body>
</html>
