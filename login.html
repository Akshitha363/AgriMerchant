<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – AgriMerchant</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .demo-creds {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 0.82rem;
    }
    .demo-creds h4 { font-weight: 700; margin-bottom: 8px; color: var(--text-muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .demo-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px dashed var(--border);
      gap: 8px;
    }
    .demo-row:last-child { border-bottom: none; }
    .demo-role {
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--primary-pale);
      color: var(--primary);
      padding: 2px 8px;
      border-radius: 50px;
      white-space: nowrap;
    }
    .demo-cred-text { font-size: 0.78rem; color: var(--text-muted); }
    .fill-btn {
      font-size: 0.72rem;
      padding: 3px 8px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🌿</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your AgriMerchant account</p>
    </div>

    <!-- Demo Credentials -->
    <div class="demo-creds">
      <h4>🔑 Demo Credentials</h4>
      <div class="demo-row">
        <span class="demo-role">Admin</span>
        <span class="demo-cred-text">admin@agri.com / admin123</span>
        <button class="fill-btn" onclick="fillCreds('admin@agri.com','admin123')">Fill</button>
      </div>
      <div class="demo-row">
        <span class="demo-role">Farmer</span>
        <span class="demo-cred-text">ravi@farm.com / ravi123</span>
        <button class="fill-btn" onclick="fillCreds('ravi@farm.com','ravi123')">Fill</button>
      </div>
      <div class="demo-row">
        <span class="demo-role">Customer</span>
        <span class="demo-cred-text">priya@email.com / priya123</span>
        <button class="fill-btn" onclick="fillCreds('priya@email.com','priya123')">Fill</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
    </div>

    <div id="login-error" style="color:#ef5350; font-size:0.85rem; margin-bottom:12px; display:none;"></div>

    <button class="btn btn-primary btn-block" onclick="handleLogin()">Sign In →</button>

    <div class="auth-switch mt-2">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
    <div class="auth-switch mt-1">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>
</div>

<script src="utils.js"></script>
<script>
  // If already logged in, redirect
  const user = getLoggedInUser();
  if (user) {
    if (user.role === 'admin') window.location.href = 'admin_dashboard.html';
    else if (user.role === 'vendor') window.location.href = 'vendor_dashboard.html';
    else window.location.href = 'index.html';
  }

  function fillCreds(email, pass) {
    document.getElementById('login-email').value = email;
    document.getElementById('login-password').value = pass;
  }

  function handleLogin() {
    const email = document.getElementById('login-email').value.trim().toLowerCase();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');

    if (!email || !password) {
      errorEl.textContent = 'Please fill in all fields';
      errorEl.style.display = 'block';
      return;
    }

    // Check admin
    const users = getUsers();
    const vendors = getVendors();
    const allAccounts = [...users, ...vendors];
    const account = allAccounts.find(a => a.email.toLowerCase() === email && a.password === password);

    if (!account) {
      errorEl.textContent = '❌ Invalid email or password';
      errorEl.style.display = 'block';
      return;
    }

    localStorage.setItem('loggedInUser', JSON.stringify(account));
    showToast(`Welcome back, ${account.name}! 👋`);

    setTimeout(() => {
      if (account.role === 'admin') window.location.href = 'admin_dashboard.html';
      else if (account.role === 'vendor') window.location.href = 'vendor_dashboard.html';
      else window.location.href = 'index.html';
    }, 600);
  }

  // Enter key support
  document.addEventListener('keypress', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
