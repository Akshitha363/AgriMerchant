<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Dashboard – AgriMerchant</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .vendor-main { padding: 32px 24px; }
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .quick-action-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      display: block;
      box-shadow: var(--shadow-sm);
    }
    .quick-action-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--primary-light); }
    .qa-icon { font-size: 2rem; margin-bottom: 8px; }
    .qa-label { font-weight: 700; font-size: 0.9rem; color: var(--text); }
    .qa-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
    .product-actions { display: flex; gap: 6px; }
    .img-preview {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">🌿</div>
      AgriMerchant
    </a>
    <div class="nav-links" id="nav-links-wrap">
      <a href="index.html" class="nav-link">🏠 Store</a>
      <a href="vendor_dashboard.html" class="nav-link active">🌾 Dashboard</a>
      <span id="nav-auth-links" style="display:contents"></span>
      <button class="dark-toggle">🌙</button>
    </div>
    <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="vendor-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div style="font-size:0.75rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:14px; padding: 0 14px;">Menu</div>
    <nav class="sidebar-nav">
      <a href="vendor_dashboard.html" class="sidebar-link active">📊 Dashboard</a>
      <a href="add_products.html" class="sidebar-link">➕ Add Product</a>
      <a href="orders_vendor.html" class="sidebar-link">📦 My Orders</a>
      <a href="products.html" class="sidebar-link">🛍️ View Store</a>
      <hr style="border:none;border-top:1px solid var(--border);margin:10px 0;">
      <a href="#" onclick="logout()" class="sidebar-link" style="color:#ef5350;">🚪 Logout</a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="vendor-main">
    <div id="dashboard-content">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<script src="utils.js"></script>
<script>
  let vendorUser;
  let editingProductId = null;

  document.addEventListener('DOMContentLoaded', () => {
    vendorUser = requireAuth('vendor');
    if (!vendorUser) return;
    renderDashboard();
  });

  function renderDashboard() {
    const products = getProducts().filter(p => p.vendorId === vendorUser.id);
    const orders = getOrders().filter(o => o.items.some(i => i.vendorId === vendorUser.id));
    const revenue = orders.reduce((sum, o) => {
      const vendorTotal = o.items.filter(i => i.vendorId === vendorUser.id).reduce((s, i) => s + i.price * i.qty, 0);
      return sum + vendorTotal;
    }, 0);

    document.getElementById('dashboard-content').innerHTML = `
      <div class="page-header">
        <h1>Welcome, ${vendorUser.name} 👋</h1>
        <p>${vendorUser.farm || 'Your Farm'} · ${vendorUser.location || 'India'}</p>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon green">🛍️</div>
          <div>
            <div class="stat-label">Total Products</div>
            <div class="stat-value">${products.length}</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">📦</div>
          <div>
            <div class="stat-label">Total Orders</div>
            <div class="stat-value">${orders.length}</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">💰</div>
          <div>
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value">₹${revenue.toLocaleString('en-IN')}</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">📋</div>
          <div>
            <div class="stat-label">Pending Orders</div>
            <div class="stat-value">${orders.filter(o => o.status === 'Processing').length}</div>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <a href="add_products.html" class="quick-action-card">
          <div class="qa-icon">➕</div>
          <div class="qa-label">Add New Product</div>
          <div class="qa-sub">List a new item</div>
        </a>
        <a href="orders_vendor.html" class="quick-action-card">
          <div class="qa-icon">📦</div>
          <div class="qa-label">View Orders</div>
          <div class="qa-sub">${orders.length} total orders</div>
        </a>
        <a href="products.html" class="quick-action-card">
          <div class="qa-icon">🛍️</div>
          <div class="qa-label">Visit Store</div>
          <div class="qa-sub">See your listings</div>
        </a>
      </div>

      <!-- My Products Table -->
      <div class="table-card">
        <div class="table-card-header">
          <span class="table-card-title">🌿 My Products (${products.length})</span>
          <a href="add_products.html" class="btn btn-primary btn-sm">+ Add Product</a>
        </div>
        ${products.length === 0 ? `
          <div class="empty-state">
            <span class="empty-icon">🌱</span>
            <h3>No products yet</h3>
            <p>Start by adding your first product</p>
            <a href="add_products.html" class="btn btn-primary mt-2">Add Product</a>
          </div>
        ` : `
          <div style="overflow-x:auto;">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Badge</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${products.map(p => `
                  <tr>
                    <td>
                      <div style="display:flex;align-items:center;gap:10px;">
                        <img src="${p.img}" class="img-preview" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&q=80'">
                        <span style="font-weight:600;">${p.name}</span>
                      </div>
                    </td>
                    <td>${p.category}</td>
                    <td style="font-weight:700; color:var(--primary);">₹${p.price}</td>
                    <td>${p.stock} units</td>
                    <td>${p.badge ? `<span class="badge badge-success">${p.badge}</span>` : '—'}</td>
                    <td>
                      <div class="product-actions">
                        <button class="btn btn-secondary btn-sm" onclick="editProduct('${p.id}')">✏️ Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">🗑️</button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `}
      </div>

      <!-- Recent Orders -->
      <div class="table-card">
        <div class="table-card-header">
          <span class="table-card-title">📦 Recent Orders</span>
          <a href="orders_vendor.html" class="see-all">View All →</a>
        </div>
        ${orders.length === 0 ? `
          <div class="empty-state" style="padding:32px;">
            <span class="empty-icon">📭</span>
            <h3>No orders yet</h3>
            <p>Orders will appear here once customers start buying</p>
          </div>
        ` : `
          <div style="overflow-x:auto;">
            <table class="data-table">
              <thead>
                <tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Amount</th><th>Status</th><th>Date</th></tr>
              </thead>
              <tbody>
                ${orders.slice(-5).reverse().map(o => `
                  <tr>
                    <td style="font-family:monospace;font-size:0.82rem;">${o.id}</td>
                    <td>${o.customerName}</td>
                    <td>${o.items.filter(i => i.vendorId === vendorUser.id).map(i => i.name).join(', ')}</td>
                    <td style="font-weight:700;color:var(--primary);">₹${o.items.filter(i=>i.vendorId===vendorUser.id).reduce((s,i)=>s+i.price*i.qty,0)}</td>
                    <td><span class="badge ${o.status === 'Delivered' ? 'badge-success' : o.status === 'Processing' ? 'badge-warning' : 'badge-info'}">${o.status}</span></td>
                    <td>${formatDate(o.createdAt)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `}
      </div>
    `;
  }

  function deleteProduct(id) {
    if (!confirm('Delete this product permanently?')) return;
    let products = getProducts();
    products = products.filter(p => p.id !== id);
    saveProducts(products);
    showToast('Product deleted', 'info');
    renderDashboard();
  }

  function editProduct(id) {
    const products = getProducts();
    const p = products.find(pr => pr.id === id);
    if (!p) return;
    editingProductId = id;

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'edit-modal';
    modal.innerHTML = `
      <div class="modal" style="max-width:520px;">
        <h3>✏️ Edit Product</h3>
        <div class="form-group">
          <label class="form-label">Product Name</label>
          <input class="form-input" id="edit-name" value="${p.name}">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label class="form-label">Price (₹)</label>
            <input class="form-input" type="number" id="edit-price" value="${p.price}">
          </div>
          <div class="form-group">
            <label class="form-label">Stock</label>
            <input class="form-input" type="number" id="edit-stock" value="${p.stock}">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-input" id="edit-category">
              <option ${p.category==='Fruits'?'selected':''}>Fruits</option>
              <option ${p.category==='Vegetables'?'selected':''}>Vegetables</option>
              <option ${p.category==='Leafy'?'selected':''}>Leafy</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Badge</label>
            <select class="form-input" id="edit-badge">
              <option value="" ${!p.badge?'selected':''}>None</option>
              <option value="Organic" ${p.badge==='Organic'?'selected':''}>Organic</option>
              <option value="Seasonal" ${p.badge==='Seasonal'?'selected':''}>Seasonal</option>
              <option value="Premium" ${p.badge==='Premium'?'selected':''}>Premium</option>
              <option value="Fresh" ${p.badge==='Fresh'?'selected':''}>Fresh</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Image URL</label>
          <input class="form-input" id="edit-img" value="${p.img}" placeholder="https://...">
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button class="btn btn-primary" style="flex:1" onclick="saveEdit('${p.id}')">Save Changes</button>
          <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  }

  function saveEdit(id) {
    const products = getProducts();
    const idx = products.findIndex(p => p.id === id);
    if (idx === -1) return;
    products[idx].name = document.getElementById('edit-name').value.trim();
    products[idx].price = parseFloat(document.getElementById('edit-price').value);
    products[idx].stock = parseInt(document.getElementById('edit-stock').value);
    products[idx].category = document.getElementById('edit-category').value;
    products[idx].badge = document.getElementById('edit-badge').value;
    products[idx].img = document.getElementById('edit-img').value.trim();
    saveProducts(products);
    closeEditModal();
    showToast('Product updated!');
    renderDashboard();
  }

  function closeEditModal() {
    const modal = document.getElementById('edit-modal');
    if (modal) modal.remove();
  }
</script>
</body>
</html>
