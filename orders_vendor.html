<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders – AgriMerchant</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .orders-main { padding: 32px 24px; max-width: 900px; }
    .status-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">🌿</div>
      AgriMerchant
    </a>
    <div class="nav-links" id="nav-links-wrap">
      <a href="vendor_dashboard.html" class="nav-link">← Dashboard</a>
      <span id="nav-auth-links" style="display:contents"></span>
      <button class="dark-toggle">🌙</button>
    </div>
    <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="vendor-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div style="font-size:0.75rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:14px; padding: 0 14px;">Menu</div>
    <nav class="sidebar-nav">
      <a href="vendor_dashboard.html" class="sidebar-link">📊 Dashboard</a>
      <a href="add_products.html" class="sidebar-link">➕ Add Product</a>
      <a href="orders_vendor.html" class="sidebar-link active">📦 My Orders</a>
      <a href="products.html" class="sidebar-link">🛍️ View Store</a>
      <hr style="border:none;border-top:1px solid var(--border);margin:10px 0;">
      <a href="#" onclick="logout()" class="sidebar-link" style="color:#ef5350;">🚪 Logout</a>
    </nav>
  </aside>

  <main class="orders-main">
    <div class="page-header">
      <h1>📦 My Orders</h1>
      <p>Orders containing your products</p>
    </div>

    <div class="status-filter" id="status-filter">
      <button class="pill active" onclick="filterOrders('', this)">All Orders</button>
      <button class="pill" onclick="filterOrders('Processing', this)">🟡 Processing</button>
      <button class="pill" onclick="filterOrders('Shipped', this)">🔵 Shipped</button>
      <button class="pill" onclick="filterOrders('Delivered', this)">🟢 Delivered</button>
    </div>

    <div id="orders-list">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<script src="utils.js"></script>
<script>
  let vendorUser;
  let vendorOrders = [];

  document.addEventListener('DOMContentLoaded', () => {
    vendorUser = requireAuth('vendor');
    if (!vendorUser) return;
    vendorOrders = getOrders().filter(o => o.items.some(i => i.vendorId === vendorUser.id));
    renderOrders('');
  });

  function filterOrders(status, btn) {
    document.querySelectorAll('#status-filter .pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderOrders(status);
  }

  function renderOrders(statusFilter) {
    const list = document.getElementById('orders-list');
    let orders = vendorOrders;
    if (statusFilter) orders = orders.filter(o => o.status === statusFilter);

    if (!orders.length) {
      list.innerHTML = `<div class="empty-state"><span class="empty-icon">📭</span><h3>No orders found</h3><p>Orders will appear here when customers buy your products</p></div>`;
      return;
    }

    list.innerHTML = [...orders].reverse().map(order => {
      const myItems = order.items.filter(i => i.vendorId === vendorUser.id);
      const myTotal = myItems.reduce((s, i) => s + i.price * i.qty, 0);
      return `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">#${order.id}</div>
              <div class="order-date">📅 ${formatDate(order.createdAt)} · 👤 ${order.customerName}</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="badge ${order.status === 'Delivered' ? 'badge-success' : order.status === 'Processing' ? 'badge-warning' : 'badge-info'}">${order.status}</span>
              <select class="form-input" style="padding:6px 10px;font-size:0.82rem;width:auto;" onchange="updateStatus('${order.id}', this.value)">
                <option ${order.status==='Processing'?'selected':''}>Processing</option>
                <option ${order.status==='Shipped'?'selected':''}>Shipped</option>
                <option ${order.status==='Delivered'?'selected':''}>Delivered</option>
                <option ${order.status==='Cancelled'?'selected':''}>Cancelled</option>
              </select>
            </div>
          </div>
          <div class="order-items-list">
            ${myItems.map(item => `
              <div class="order-item-row">
                <img src="${item.img}" class="order-item-img" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&q=80'">
                <div style="flex:1;">
                  <div style="font-weight:600;">${item.name}</div>
                  <div style="color:var(--text-muted);font-size:0.78rem;">Qty: ${item.qty} × ₹${item.price}</div>
                </div>
                <div style="font-weight:700;color:var(--primary);">₹${item.price * item.qty}</div>
              </div>
            `).join('')}
          </div>
          <div class="order-total-row">
            <span style="color:var(--text-muted);font-size:0.88rem;">${myItems.length} item(s)</span>
            <div style="font-family:var(--font-display);font-weight:800;font-size:1.1rem;color:var(--primary);">₹${myTotal}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function updateStatus(orderId, newStatus) {
    const orders = getOrders();
    const order = orders.find(o => o.id === orderId);
    if (order) {
      order.status = newStatus;
      saveOrders(orders);
      vendorOrders = orders.filter(o => o.items.some(i => i.vendorId === vendorUser.id));
      showToast(`Order status updated to ${newStatus}`);
    }
  }
</script>
</body>
</html>
