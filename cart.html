<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – AgriMerchant</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.8rem;
      color: var(--text);
      padding: 32px 24px 8px;
      max-width: 900px;
      margin: 0 auto;
    }
    .empty-cart-wrap {
      text-align: center;
      padding: 80px 24px;
      max-width: 400px;
      margin: 0 auto;
    }
    .promo-input-wrap {
      display: flex;
      gap: 8px;
      margin: 16px 0;
    }
    .promo-input-wrap input {
      flex: 1;
      padding: 10px 14px;
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
    }
    .promo-input-wrap input:focus { border-color: var(--primary-light); border-style: solid; }
    .delivery-info {
      background: var(--primary-pale);
      border: 1px solid var(--primary-light);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.84rem;
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .order-success-modal {
      text-align: center;
    }
    .order-success-modal .check {
      font-size: 4rem;
      margin-bottom: 12px;
    }
    .order-success-modal h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary);
    }
    .order-success-modal p { color: var(--text-muted); margin: 8px 0 20px; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">🌿</div>
      AgriMerchant
    </a>
    <div class="nav-links" id="nav-links-wrap">
      <a href="index.html" class="nav-link">🏠 Home</a>
      <a href="products.html" class="nav-link">🛍️ Products</a>
      <div id="nav-auth-links" style="display:contents"></div>
      <a href="cart.html" class="nav-link nav-cart-btn active">
        🛒 Cart
        <span class="cart-badge" style="display:none">0</span>
      </a>
      <button class="dark-toggle">🌙</button>
    </div>
    <button class="hamburger" id="hamburger-btn">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="page-title">🛒 Your Cart</div>

<div class="cart-wrap" id="cart-wrap">
  <div class="spinner-wrap"><div class="spinner"></div></div>
</div>

<!-- Order Success Modal -->
<div class="modal-overlay hidden" id="success-modal">
  <div class="modal order-success-modal">
    <div class="check">🎉</div>
    <h3>Order Placed!</h3>
    <p>Your fresh produce order has been placed. Farmers have been notified and will deliver soon!</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <a href="products.html" class="btn btn-secondary">Continue Shopping</a>
      <button onclick="closeSuccessModal()" class="btn btn-primary">View Orders</button>
    </div>
  </div>
</div>

<script src="utils.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    renderCart();
  });

  function renderCart() {
    const user = getLoggedInUser();
    const wrap = document.getElementById('cart-wrap');

    if (!user) {
      wrap.innerHTML = `
        <div class="empty-cart-wrap">
          <div class="empty-state">
            <span class="empty-icon">🔐</span>
            <h3>Login to view your cart</h3>
            <p>You need to be logged in to access your cart</p>
            <a href="login.html" class="btn btn-primary mt-2">Login</a>
          </div>
        </div>`;
      return;
    }

    const cart = getCart();
    const products = getProducts();

    if (!cart.length) {
      wrap.innerHTML = `
        <div class="empty-cart-wrap">
          <div class="empty-state">
            <span class="empty-icon">🛒</span>
            <h3>Your cart is empty</h3>
            <p>Add some fresh farm produce to get started!</p>
            <a href="products.html" class="btn btn-primary mt-2">Browse Products</a>
          </div>
        </div>`;
      return;
    }

    // Build cart items with product info
    const cartItems = cart.map(ci => {
      const p = products.find(p => p.id === ci.productId);
      return p ? { ...ci, product: p } : null;
    }).filter(Boolean);

    const subtotal = cartItems.reduce((s, i) => s + (i.product.price * i.qty), 0);
    const delivery = subtotal >= 500 ? 0 : 40;
    const total = subtotal + delivery;

    wrap.innerHTML = `
      <div class="cart-grid">
        <div>
          <div class="cart-items" id="cart-items-list">
            ${cartItems.map(item => `
              <div class="cart-item" id="cart-item-${item.productId}">
                <img class="cart-item-img" src="${item.product.img}" alt="${item.product.name}" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&q=80'">
                <div class="cart-item-info">
                  <div class="cart-item-name">${item.product.name}</div>
                  <div class="cart-item-unit">${item.product.vendorName} · ${item.product.unit}</div>
                  <div class="cart-item-unit" style="margin-top:4px;">₹${item.product.price} each</div>
                </div>
                <div class="qty-ctrl">
                  <button class="qty-btn" onclick="changeQty('${item.productId}', -1)">−</button>
                  <span class="qty-val" id="qty-${item.productId}">${item.qty}</span>
                  <button class="qty-btn" onclick="changeQty('${item.productId}', 1)">+</button>
                </div>
                <div class="cart-item-price" id="price-${item.productId}">₹${item.product.price * item.qty}</div>
                <button class="remove-btn" onclick="removeItem('${item.productId}')" title="Remove">🗑️</button>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:16px;display:flex;justify-content:flex-end;">
            <button onclick="clearCart()" class="btn btn-secondary btn-sm">🗑️ Clear Cart</button>
          </div>
        </div>

        <div class="cart-summary">
          <div class="summary-title">Order Summary</div>
          
          <div class="delivery-info">🚚 Free delivery on orders above ₹500!</div>

          <div class="summary-row">
            <span>Subtotal (${cartItems.reduce((s,i)=>s+i.qty,0)} items)</span>
            <span id="summary-subtotal">₹${subtotal}</span>
          </div>
          <div class="summary-row">
            <span>Delivery Fee</span>
            <span id="summary-delivery" style="color:${delivery === 0 ? 'var(--primary)' : ''}">${delivery === 0 ? 'FREE' : '₹' + delivery}</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="summary-total">₹${total}</span>
          </div>

          <div class="promo-input-wrap">
            <input type="text" id="promo-code" placeholder="Promo code (FRESH10)">
            <button class="btn btn-secondary btn-sm" onclick="applyPromo()">Apply</button>
          </div>

          <button class="btn btn-primary btn-block mt-2" onclick="placeOrder()">
            ✅ Place Order · ₹<span id="btn-total">${total}</span>
          </button>

          <a href="products.html" class="btn btn-secondary btn-block mt-1" style="margin-top:10px; text-align:center; text-decoration:none;">
            ← Continue Shopping
          </a>
        </div>
      </div>
    `;
  }

  function changeQty(productId, delta) {
    const cart = getCart();
    const item = cart.find(i => i.productId === productId);
    if (!item) return;
    item.qty = Math.max(1, item.qty + delta);
    saveCart(cart);
    updateCartBadge();
    
    const products = getProducts();
    const product = products.find(p => p.id === productId);
    if (product) {
      document.getElementById(`qty-${productId}`).textContent = item.qty;
      document.getElementById(`price-${productId}`).textContent = `₹${product.price * item.qty}`;
    }
    recalcSummary();
  }

  function removeItem(productId) {
    let cart = getCart();
    cart = cart.filter(i => i.productId !== productId);
    saveCart(cart);
    updateCartBadge();
    if (!cart.length) { renderCart(); return; }
    const el = document.getElementById(`cart-item-${productId}`);
    if (el) { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = '0.3s'; setTimeout(() => el.remove(), 300); }
    recalcSummary();
    showToast('Item removed', 'info');
  }

  function clearCart() {
    if (!confirm('Clear all items from cart?')) return;
    saveCart([]);
    updateCartBadge();
    renderCart();
    showToast('Cart cleared', 'info');
  }

  function recalcSummary() {
    const cart = getCart();
    const products = getProducts();
    const cartItems = cart.map(ci => {
      const p = products.find(p => p.id === ci.productId);
      return p ? { ...ci, product: p } : null;
    }).filter(Boolean);

    const subtotal = cartItems.reduce((s, i) => s + (i.product.price * i.qty), 0);
    const delivery = subtotal >= 500 ? 0 : 40;
    const total = subtotal + delivery;

    const subEl = document.getElementById('summary-subtotal');
    const delEl = document.getElementById('summary-delivery');
    const totEl = document.getElementById('summary-total');
    const btnEl = document.getElementById('btn-total');

    if (subEl) subEl.textContent = `₹${subtotal}`;
    if (delEl) { delEl.textContent = delivery === 0 ? 'FREE' : `₹${delivery}`; delEl.style.color = delivery === 0 ? 'var(--primary)' : ''; }
    if (totEl) totEl.textContent = `₹${total}`;
    if (btnEl) btnEl.textContent = total;
  }

  function applyPromo() {
    const code = document.getElementById('promo-code').value.trim().toUpperCase();
    if (code === 'FRESH10') {
      showToast('Promo code applied! 10% off 🎉', 'success');
    } else {
      showToast('Invalid promo code', 'error');
    }
  }

  function placeOrder() {
    const user = getLoggedInUser();
    if (!user) { window.location.href = 'login.html'; return; }

    const cart = getCart();
    const products = getProducts();
    if (!cart.length) { showToast('Cart is empty!', 'warning'); return; }

    const cartItems = cart.map(ci => {
      const p = products.find(p => p.id === ci.productId);
      return p ? { productId: ci.productId, name: p.name, qty: ci.qty, price: p.price, img: p.img, vendorId: p.vendorId, vendorName: p.vendorName } : null;
    }).filter(Boolean);

    const subtotal = cartItems.reduce((s, i) => s + (i.price * i.qty), 0);
    const delivery = subtotal >= 500 ? 0 : 40;
    const total = subtotal + delivery;

    const order = {
      id: `ord-${Date.now()}`,
      customerId: user.id,
      customerName: user.name,
      items: cartItems,
      total,
      delivery,
      status: 'Processing',
      createdAt: new Date().toISOString()
    };

    const orders = getOrders();
    orders.push(order);
    saveOrders(orders);
    saveCart([]);
    updateCartBadge();

    document.getElementById('success-modal').classList.remove('hidden');
  }

  function closeSuccessModal() {
    document.getElementById('success-modal').classList.add('hidden');
    renderCart();
  }
</script>
</body>
</html>
